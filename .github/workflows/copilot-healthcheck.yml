# =============================================================
# Copilot E2E ヘルスチェック — copilot-poc.yml を呼び出して検証
# =============================================================
# 1日1回 copilot-poc.yml（本番ワークフロー）を実行し、
# 失敗したらエラーログ付き Issue を作成して Copilot Coding Agent にアサインする。
#
# 必要な Secrets:
#   REPO_FG_TOKEN — workflow_dispatch トリガー + Issue 作成 + Copilot アサイン用 PAT
#                  （特定リポジトリ / metadata:r, actions:rw, contents:rw,
#                    issues:rw, pull_requests:rw）
# =============================================================

name: Copilot E2E Healthcheck

on:
  schedule:
    # 毎日 JST 9:00（UTC 0:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: 'テスト用: Issue 作成をテストするために意図的に失敗させる'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -------------------------------------------------------
      # 1. チェックアウト（gh CLI 用）
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------------------------------------------------------
      # 2. copilot-poc.yml をトリガーして完了を待つ
      # -------------------------------------------------------
      - name: Trigger copilot-poc workflow
        id: trigger
        env:
          GH_TOKEN: ${{ secrets.REPO_FG_TOKEN }}
          TZ: Asia/Tokyo
        run: |
          if [ "${{ inputs.simulate_failure }}" = "true" ]; then
            echo "🧪 テスト失敗モード: 意図的にエラーを発生させます"
            echo "poc-failed=true" >> "$GITHUB_OUTPUT"
            echo "run-id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # トリガー前のタイムスタンプ（run 特定用）
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          sleep 1

          echo "🚀 copilot-poc.yml をトリガー中..."
          gh workflow run copilot-poc.yml \
            -f prompt="Azure Monitor の概要がわかるワンページャーのPPTX資料を作成してください。" \
            -f output_format="PPTX" \
            -f model="claude-opus-4.6" \
            -f source="healthcheck"

          # run が登録されるのを待つ
          echo "⏳ ワークフロー run の登録を待機中..."
          for i in $(seq 1 12); do
            sleep 10
            RUN_ID=$(gh run list --workflow=copilot-poc.yml --created=">$BEFORE" --limit=1 --json databaseId --jq '.[0].databaseId')
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "✅ Run ID: $RUN_ID"
              break
            fi
            echo "  待機中... ($i/12)"
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "❌ ワークフロー run が見つかりません"
            echo "poc-failed=true" >> "$GITHUB_OUTPUT"
            echo "run-id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"

          echo "⏳ copilot-poc.yml の完了を待機中..."
          if gh run watch "$RUN_ID" --exit-status; then
            echo "✅ copilot-poc.yml 成功"
            echo "poc-failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "❌ copilot-poc.yml 失敗"
            echo "poc-failed=true" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------------------
      # 3. 失敗時にエラーログを収集
      # -------------------------------------------------------
      - name: Collect error logs
        id: collect-logs
        if: steps.trigger.outputs.poc-failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_FG_TOKEN }}
        run: |
          RUN_ID="${{ steps.trigger.outputs.run-id }}"
          {
            echo "## E2E ヘルスチェック失敗"
            echo ""
            if [ -n "$RUN_ID" ]; then
              echo "**Failed Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}"
              echo ""
              echo "### エラーログ（末尾 80 行）"
              echo ""
              echo '```'
              gh run view "$RUN_ID" --log-failed 2>/dev/null | tail -80 || echo "(ログ取得失敗)"
              echo '```'
            else
              echo "**Healthcheck Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              echo ""
              echo "copilot-poc.yml のトリガーまたは run 検出に失敗しました。"
            fi
            echo ""
            echo "### 対応指示"
            echo ""
            echo "上記のエラーログを分析し、原因を特定して修正してください。"
          } > /tmp/issue_body.md
          echo "📋 Issue 本文を生成しました"

      # -------------------------------------------------------
      # 4. 失敗時に Issue を作成
      # -------------------------------------------------------
      - name: Create issue on failure
        id: create-issue
        if: steps.trigger.outputs.poc-failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_FG_TOKEN }}
        run: |
          # 同じタイトルの Open Issue が既にあればスキップ
          EXISTING=$(gh issue list --state open --search "E2E Healthcheck 失敗" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "⏭️ 既に Open の Issue があるためスキップ"
            exit 0
          fi

          TITLE="🚨 Copilot E2E Healthcheck 失敗 ($(TZ=Asia/Tokyo date '+%Y-%m-%d'))"
          ISSUE_URL=$(gh issue create --title "$TITLE" --body-file /tmp/issue_body.md --label "bug")
          echo "📋 Issue created: $ISSUE_URL"
          echo "issue-number=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------
      # 5. Copilot Coding Agent を Issue にアサイン
      # -------------------------------------------------------
      - name: Assign Copilot to issue
        if: steps.create-issue.outputs.issue-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPO_FG_TOKEN }}
        run: |
          ISSUE_NUM="${{ steps.create-issue.outputs.issue-number }}"
          echo "🤖 Copilot を Issue #$ISSUE_NUM にアサイン中..."
          gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/assignees" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --input - <<< '{
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "${{ github.repository }}",
              "base_branch": "master"
            }
          }' \
            || echo "⚠️ Copilot アサイン失敗（手動でアサインしてください）"
