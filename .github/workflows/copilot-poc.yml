# =============================================================
# Copilot SDK Runner — GitHub Actions で Copilot SDK を実行
# =============================================================
# Copilot CLI を SDK 経由でプログラマティックに呼び出す。
#
# 前提:
#   1. Fine-grained PAT を作成（Permission: Copilot Requests）
#   2. リポジトリ Secret に COPILOT_FG_TOKEN として登録
#   3. Actions タブ → "Copilot SDK Runner" → "Run workflow" で手動実行
#
# アーキテクチャ:
#   src/copilot-sdk-runner.mjs → @github/copilot-sdk → Copilot CLI (server mode)
#
# 参考:
#   - https://github.com/github/copilot-sdk
#   - https://docs.github.com/copilot/using-copilot/using-copilot-cli
# =============================================================

name: Copilot SDK Runner
run-name: "${{ inputs.prompt }}"

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt to send to Copilot'
        required: true
        default: 'Azure App Service の概要をMSLearnで調査してください。'
      output_format:
        description: 'Output format (leave empty for no preference)'
        required: false
        default: 'PPTX'
      language:
        description: 'Output language'
        required: false
        default: 'Japanese'
        type: choice
        options:
          - Japanese
          - English
      model:
        description: 'AI model'
        required: false
        default: 'claude-opus-4.6'
        type: choice
        options:
          # Anthropic
          - claude-opus-4.6
          - claude-opus-4.6-fast
          - claude-opus-4.5
          - claude-sonnet-4.6
          - claude-sonnet-4.5
          - claude-sonnet-4
          - claude-haiku-4.5
          # OpenAI
          - gpt-5.4
          - gpt-5.3-codex
          - gpt-5.2-codex
          - gpt-5.2
          - gpt-5.1-codex-max
          - gpt-5.1-codex
          - gpt-5.1-codex-mini
          - gpt-5.1
          - gpt-5-mini
          - gpt-4.1
          # Google
          - gemini-3-pro-preview
      source:
        description: 'Trigger source'
        required: false
        default: 'github-ui'
        type: choice
        options:
          - github-ui
          - webapp

permissions:
  contents: read

jobs:
  copilot-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -------------------------------------------------------
      # 1. チェックアウト（Git LFS サポート有効化）
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      # -------------------------------------------------------
      # 1-1. Git LFS ファイルの取得
      # -------------------------------------------------------
      - name: Pull Git LFS files
        run: git lfs pull

      # -------------------------------------------------------
      # 2. Node.js セットアップ（SDK が node:sqlite を使うため 22+ 必須）
      # -------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # -------------------------------------------------------
      # 3. Copilot CLI + SDK インストール
      # -------------------------------------------------------
      - name: Install Copilot CLI and SDK
        run: |
          npm install -g @github/copilot
          npm install @github/copilot-sdk

      # -------------------------------------------------------
      # 4. インストール確認
      # -------------------------------------------------------
      - name: Verify installation
        run: |
          echo "📍 Which copilot: $(which copilot)"
          echo "📍 Copilot version: $(copilot --version 2>/dev/null || echo 'unknown')"
          echo "📍 SDK installed: $(node -e "require('@github/copilot-sdk'); console.log('OK')" 2>&1)"
          copilot --help 2>&1 | head -20 || true

      # -------------------------------------------------------
      # 5. 認証チェック
      # -------------------------------------------------------
      - name: Check authentication
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_FG_TOKEN }}
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "❌ COPILOT_GITHUB_TOKEN is EMPTY — Secret が正しく設定されていません"
            exit 1
          else
            echo "✅ COPILOT_GITHUB_TOKEN is set (length: ${#COPILOT_GITHUB_TOKEN})"
          fi

      # -------------------------------------------------------
      # 6. Copilot SDK 実行
      # -------------------------------------------------------
      - name: Run Copilot SDK
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_FG_TOKEN }}
          COPILOT_PROMPT_BASE: ${{ inputs.prompt }}
          COPILOT_OUTPUT_FORMAT: ${{ inputs.output_format }}
          COPILOT_LANGUAGE: ${{ inputs.language }}
          COPILOT_MODEL: ${{ inputs.model }}
          TZ: Asia/Tokyo
        run: |
          SUFFIX=""
          if [ -n "$COPILOT_OUTPUT_FORMAT" ]; then
            SUFFIX=" ${COPILOT_OUTPUT_FORMAT}で出力してください。"
          fi
          if [ "$COPILOT_LANGUAGE" = "English" ]; then
            SUFFIX="${SUFFIX} Please respond in English."
          fi
          SUFFIX="${SUFFIX} これはSDK非対話実行です。アウトラインの確認・承認ステップは不要です。承認済みとして直接ファイルを生成してください。"
          export COPILOT_PROMPT="${COPILOT_PROMPT_BASE}${SUFFIX}"
          echo "📝 Prompt: $COPILOT_PROMPT"
          node src/copilot-sdk-runner.mjs

      # -------------------------------------------------------
      # 6. 成果物の確認
      # -------------------------------------------------------
      - name: Check generated outputs
        if: always()
        run: |
          echo "📂 output/ ディレクトリの中身:"
          if [ -d "output" ]; then
            find output/ -type f | head -50
            echo ""
            echo "📊 ファイル数: $(find output/ -type f | wc -l)"
            echo "📊 合計サイズ: $(du -sh output/ | cut -f1)"
          else
            echo "  (output/ ディレクトリなし)"
          fi

          echo ""
          echo "📂 ワークスペースの変更:"
          git status --short

      # -------------------------------------------------------
      # 7. 成果物を Artifact としてアップロード
      # -------------------------------------------------------
      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always() && inputs.source != 'webapp'
        with:
          name: copilot-output-${{ github.run_number }}
          path: output/
          if-no-files-found: ignore
          retention-days: 7

      # -------------------------------------------------------
      # 8. プロンプトを prompt.txt として保存
      # -------------------------------------------------------
      - name: Save prompt text
        if: always()
        run: |
          mkdir -p output
          echo "${{ inputs.prompt }}" > output/prompt.txt
          echo "✅ Saved prompt.txt"

      # -------------------------------------------------------
      # 9. Blob Storage にアップロード（Web App 用）
      # -------------------------------------------------------
      - name: Upload to Blob Storage
        if: always()
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          if [ -z "$AZURE_STORAGE_CONNECTION_STRING" ]; then
            echo "⚠️ AZURE_STORAGE_CONNECTION_STRING not set — skipping blob upload"
            exit 0
          fi
          if [ -d "output" ] && [ "$(find output/ -type f | wc -l)" -gt 0 ]; then
            echo "📤 Uploading to Blob Storage (prefix: runs/${{ github.run_number }}/)"
            az storage blob upload-batch \
              --destination copilot-outputs \
              --source output/ \
              --destination-path "runs/${{ github.run_number }}" \
              --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
              --overwrite
            echo "✅ Blob upload complete"
          else
            echo "⚠️ No files in output/ — skipping blob upload"
          fi
