# =============================================================
# Copilot CLI PoC — GitHub Actions で Copilot CLI を実行
# =============================================================
# 前提:
#   1. Fine-grained PAT を作成（Permission: Copilot Requests）
#   2. リポジトリ Secret に COPILOT_FG_TOKEN として登録
#   3. Actions タブ → "Copilot CLI PoC" → "Run workflow" で手動実行
#
# 参考: https://docs.github.com/copilot/using-copilot/using-copilot-cli/automating-tasks-with-copilot-cli-and-github-actions
# =============================================================

name: Copilot CLI PoC

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Copilot に渡すプロンプト'
        required: true
        default: 'output/slides/ 配下に Azure App Service の概要スライド(SVG 960x540)を3枚作成し、scripts/svg2pptx.py で PPTX に変換してください。'
      model:
        description: 'AI モデル'
        required: false
        default: 'claude-opus-4.6'
        type: choice
        options:
          - claude-opus-4.6
          - claude-sonnet-4.6
          - gpt-5.2
          - o3

permissions:
  contents: read

concurrency:
  group: copilot-poc
  cancel-in-progress: false

jobs:
  copilot-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -------------------------------------------------------
      # 1. チェックアウト
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------------------------------------------------------
      # 2. Node.js セットアップ
      # -------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4

      # -------------------------------------------------------
      # 3. Copilot CLI インストール（公式手順）
      # -------------------------------------------------------
      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      # -------------------------------------------------------
      # 4. インストール確認
      # -------------------------------------------------------
      - name: Verify installation
        run: |
          echo "📍 Which copilot: $(which copilot)"
          echo "📍 Copilot version: $(copilot --version 2>/dev/null || echo 'unknown')"
          copilot --help 2>&1 | head -20 || true

      # -------------------------------------------------------
      # 5. 認証チェック
      # -------------------------------------------------------
      - name: Check authentication
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_FG_TOKEN }}
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "❌ COPILOT_GITHUB_TOKEN is EMPTY — Secret が正しく設定されていません"
            exit 1
          else
            echo "✅ COPILOT_GITHUB_TOKEN is set (length: ${#COPILOT_GITHUB_TOKEN})"
          fi

      # -------------------------------------------------------
      # 6. Copilot CLI 実行（プログラムモード）
      # -------------------------------------------------------
      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_FG_TOKEN }}
        run: |
          echo "🤖 Prompt: ${{ inputs.prompt }}"
          echo "🧠 Model: ${{ inputs.model }}"
          echo "COPILOT_GITHUB_TOKEN length: ${#COPILOT_GITHUB_TOKEN}"
          echo ""
          copilot -p "${{ inputs.prompt }}" --model ${{ inputs.model }}

      # -------------------------------------------------------
      # 6. 成果物の確認
      # -------------------------------------------------------
      - name: Check generated outputs
        if: always()
        run: |
          echo "📂 output/ ディレクトリの中身:"
          if [ -d "output" ]; then
            find output/ -type f | head -50
            echo ""
            echo "📊 ファイル数: $(find output/ -type f | wc -l)"
            echo "📊 合計サイズ: $(du -sh output/ | cut -f1)"
          else
            echo "  (output/ ディレクトリなし)"
          fi

          echo ""
          echo "📂 ワークスペースの変更:"
          git status --short

      # -------------------------------------------------------
      # 7. 成果物を Artifact としてアップロード
      # -------------------------------------------------------
      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: copilot-output-${{ github.run_number }}
          path: output/
          if-no-files-found: ignore
          retention-days: 7
