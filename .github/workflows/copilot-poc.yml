# =============================================================
# Copilot CLI PoC — GitHub Actions で Copilot Agent が動くか検証
# =============================================================
# 使い方:
#   1. GitHub リポジトリの Settings > Secrets and variables > Actions で
#      GH_TOKEN（PAT: repo, workflow, copilot スコープ）を登録
#   2. Actions タブ → "Copilot CLI PoC" → "Run workflow" で手動実行
#   3. ログと Artifacts を確認
# =============================================================

name: Copilot CLI PoC

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Copilot に渡すプロンプト'
        required: true
        default: 'output/research/ 配下に Azure App Service の概要を report.md としてまとめてください。'
      mode:
        description: '実行モード'
        required: true
        type: choice
        options:
          - suggest    # gh copilot suggest（軽量テスト）
          - agent      # copilot -p（Agent モード）
        default: suggest

concurrency:
  group: copilot-poc
  cancel-in-progress: false

jobs:
  copilot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -------------------------------------------------------
      # 1. チェックアウト
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # 2. 環境情報の確認
      # -------------------------------------------------------
      - name: Show environment
        run: |
          echo "🔍 OS: $(uname -a)"
          echo "🔍 GitHub CLI: $(gh --version)"
          echo "🔍 Node: $(node --version 2>/dev/null || echo 'not found')"
          echo "🔍 Python: $(python3 --version 2>/dev/null || echo 'not found')"
          echo "🔍 Prompt: ${{ inputs.prompt }}"
          echo "🔍 Mode: ${{ inputs.mode }}"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # -------------------------------------------------------
      # 3. GitHub Copilot CLI 拡張のインストール
      # -------------------------------------------------------
      - name: Install Copilot CLI extension
        run: |
          echo "📦 Installing gh-copilot extension..."
          gh extension install github/gh-copilot 2>&1 || echo "⚠️ Already installed or failed"
          echo ""
          echo "📋 Installed extensions:"
          gh extension list
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # -------------------------------------------------------
      # 4. Copilot CLI の認証テスト
      # -------------------------------------------------------
      - name: Test Copilot authentication
        run: |
          echo "🔑 Testing Copilot authentication..."
          gh auth status
          echo ""
          echo "🔑 Testing Copilot access..."
          gh copilot --version 2>&1 || echo "⚠️ gh copilot --version failed"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # -------------------------------------------------------
      # 5a. Suggest モード（軽量テスト）
      # -------------------------------------------------------
      - name: "Run: gh copilot suggest"
        if: inputs.mode == 'suggest'
        run: |
          echo "🤖 Running gh copilot suggest..."
          echo ""
          gh copilot suggest "${{ inputs.prompt }}" --shell 2>&1 || {
            echo "❌ gh copilot suggest failed with exit code $?"
            echo "💡 PAT に copilot スコープが含まれているか確認してください"
          }
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # -------------------------------------------------------
      # 5b. Agent モード（本命テスト）
      # -------------------------------------------------------
      - name: "Run: copilot agent mode"
        if: inputs.mode == 'agent'
        run: |
          echo "🤖 Running Copilot Agent Mode..."
          echo ""
          echo "📍 Which copilot: $(which copilot 2>/dev/null || echo 'not in PATH')"
          echo "📍 Copilot version: $(copilot --version 2>/dev/null || echo 'unknown')"
          echo ""
          copilot -p "${{ inputs.prompt }}" --allow-all 2>&1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # -------------------------------------------------------
      # 6. 成果物の確認
      # -------------------------------------------------------
      - name: Check generated outputs
        if: always()
        run: |
          echo "📂 output/ ディレクトリの中身:"
          if [ -d "output" ]; then
            find output/ -type f | head -50
            echo ""
            echo "📊 ファイル数: $(find output/ -type f | wc -l)"
            echo "📊 合計サイズ: $(du -sh output/ | cut -f1)"
          else
            echo "  (output/ ディレクトリなし)"
          fi

          echo ""
          echo "📂 ワークスペースの変更:"
          git status --short

      # -------------------------------------------------------
      # 7. 成果物を Artifact としてアップロード（確認用）
      # -------------------------------------------------------
      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: copilot-output-${{ github.run_number }}
          path: output/
          if-no-files-found: ignore
          retention-days: 7
